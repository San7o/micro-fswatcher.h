name: Build with MinGW (Windows Cross-Compile)

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

env:
  # Point the global C compiler to the MinGW cross-compiler
  CC: x86_64-w64-mingw32-gcc

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Build
      run: make
