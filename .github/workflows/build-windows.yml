name: Windows Native Build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          make

    - name: Build
      # We use the 'msys2' shell to ensure 'make' and 'gcc' are in the path
      shell: msys2 {0}
      run: |
        make CC=gcc
